name: Close Stale Issues & PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: |
            🕐 This issue has been automatically marked as **stale** because it has had no activity for 30 days.

            It will be closed in 7 days if no further activity occurs.

            If this is still relevant:
            - 💬 Add a comment to keep it open
            - 🏷️ Add the `keep-open` label

            Thank you for helping Krishi AI! 🌾
          stale-pr-message: |
            🕐 This PR has been automatically marked as **stale** because it has had no activity for 30 days.

            It will be closed in 7 days if no further activity occurs.

            If you're still working on it, just push a commit or add a comment! 🚀
          exempt-issue-labels: 'pinned,security,keep-open'
          exempt-pr-labels: 'pinned,security,keep-open'
