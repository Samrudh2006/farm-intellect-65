title: "[Q&A] "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        ❓ **Ask anything about Krishi AI!**
        No question is too simple — we're here to help.

  - type: textarea
    id: question
    attributes:
      label: ❓ Your Question
      description: What would you like to know?
      placeholder: "How do I..."
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: 📂 Topic
      options:
        - Setup & Installation
        - Features & Usage
        - Contributing Code
        - Translations / i18n
        - Database & Backend
        - AI Features
        - Mobile App (Capacitor)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 📝 Additional Context
      description: Any relevant details (error messages, screenshots, etc.)
